<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SPTecher's Machine</title>
</head>

<body>
    <div>

        <header>
            <h1 class="title">Converting Machine</h1>
        </header>

        <div class="card">
            <h3>Insira um número:
            <select onchange="converter()" id="ipt_base" class="escolha"></h3>
            <option value="decimal" class="opcao">Decimal</option>
            <option value="binario" class="opcao">Binario</option>
            <option value="octal" class="opcao">Octal</option>
            <option value="hexa" class="opcao">Hexadecimal</option>
            </select><br><br>
            <input id="ipt_num" type="text" oninput="converter()" placeholder="número" class="campo">

                <p>Decimal:
                <div id="demo1" class="numero"></div>
                </p>
                <p>Binario:
                <div id="demo2" class="numero"></div>
                </p>
                <p>Octal:
                <div id="demo3" class="numero"></div>
                </p>
                <p>Hexadecimal:
                <div id="demo4" class="numero"></div>
                </p>
        </div>
    </div>

</body>
<script>
    function converter() {
        let base = ipt_base.value;
        let campo = ipt_num.value == '';

        if (campo){
            demo1.innerHTML = '';
            demo2.innerHTML = '';
            demo3.innerHTML = '';
            demo4.innerHTML = '';
        }else{
        if (base == 'decimal') {
            var num = Number(ipt_num.value);
        } else if (base == 'binario') {
            var num = Number.parseInt(ipt_num.value, 2);
        } else if (base == 'octal') {
            var num = Number.parseInt(ipt_num.value, 8);
        } else if (base == 'hexa') {
            var num = Number.parseInt(ipt_num.value, 16);
        } else {
            alert('Insira uma base');
        }

        demo1.innerHTML = num.toString(10);
        demo2.innerHTML = num.toString(2);
        demo3.innerHTML = num.toString(8);
        demo4.innerHTML = num.toString(16).toUpperCase();
}
    }
</script>

</html>
